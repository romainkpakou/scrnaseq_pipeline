# Configuration PBMC 3k - Module QC
project_name: "pbmc3k_analysis"
species: "human"

qc:
  min_features: 200
  max_features: 2500
  max_mt_percent: 5
  min_cells_per_gene: 3

normalization:
  method: "LogNormalize"
  scale_factor: 10000
  n_hvg: 2000

pca:
  n_dims: 50
  n_pcs_selected: 10
  jackstraw: false

clustering:
  resolution: 0.5
  algorithm: 1

umap:
  n_neighbors: 30
  min_dist: 0.3
  canonical_markers: [CD3D, CD8A, IL7R, MS4A1, CD79A, GNLY, NKG7, CD14, FCGR3A, LYZ, PPBP, FCER1A]

markers:
  test_use: "wilcox"
  min_pct: 0.25
  logfc_threshold: 0.25
  only_positive: true
  top_n_per_cluster: 10

annotation:
  perform: true
  markers_file: "assets/canonical_markers/pbmc_markers_human.yaml"
  score_threshold: 0.0

trajectories:
  perform: true
  cell_types_to_include: ["CD4 T naive", "CD4 T memory", "CD8 T"]
  start_cluster: "CD4 T naive"
  n_top_dynamic_genes: 30
  min_pct_expressed: 0.10
